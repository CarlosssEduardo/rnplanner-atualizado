# 1. Configuração do Banco Local (PostgreSQL 18)
spring.datasource.url=jdbc:postgresql://localhost:5432/rnplanner_db
spring.datasource.username=postgres
spring.datasource.password=9984
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configurações do Hibernate (O "Mágico" que cria as tabelas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Ajuste para Texto Longo (Importante para o seu "Caderno Digital")
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true